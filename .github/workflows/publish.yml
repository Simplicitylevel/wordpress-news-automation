name: WordPress News Automation

on:
  schedule:
    - cron: '0 2 * * *'   # Runs daily at 7:30 AM IST (2:00 AM UTC)
  workflow_dispatch:        # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run automation script
        env:
          WP_URL:           ${{ secrets.WP_URL }}
          WP_USERNAME:      ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:  ${{ secrets.WP_APP_PASSWORD }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:   ${{ secrets.PEXELS_API_KEY }}
          ADSTERRA_NATIVE:  ${{ secrets.ADSTERRA_NATIVE }}
          ADSTERRA_BANNER:  ${{ secrets.ADSTERRA_BANNER }}
        run: python wp_auto.py

      - name: Save published state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f published_state.json || true
          git diff --staged --quiet || git commit -m "Update published state [skip ci]"
          git push || true
